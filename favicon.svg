<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark background circle -->
  <circle cx="32" cy="32" r="32" fill="#1A1A1A"/>

  <!-- Decorative outer ring - native geometric pattern -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#D4A843" stroke-width="1.5" stroke-dasharray="4 2"/>

  <!-- Top geometric accent - diamond row -->
  <polygon points="32,4 34.5,7 32,10 29.5,7" fill="#B22234"/>
  <polygon points="22,6 24.5,9 22,12 19.5,9" fill="#D4A843"/>
  <polygon points="42,6 44.5,9 42,12 39.5,9" fill="#D4A843"/>

  <!-- Bottom geometric accent - diamond row -->
  <polygon points="32,54 34.5,57 32,60 29.5,57" fill="#B22234"/>
  <polygon points="22,52 24.5,55 22,58 19.5,55" fill="#D4A843"/>
  <polygon points="42,52 44.5,55 42,58 39.5,55" fill="#D4A843"/>

  <!-- Horizontal accent bars -->
  <rect x="4" y="30.5" width="10" height="3" fill="#D4A843" opacity="0.7"/>
  <rect x="50" y="30.5" width="10" height="3" fill="#D4A843" opacity="0.7"/>

  <!-- Stylized "2" -->
  <text
    x="16"
    y="43"
    font-family="Georgia, serif"
    font-size="26"
    font-weight="700"
    fill="#FFFFFF"
    letter-spacing="-1"
  >2</text>

  <!-- Stylized "6" with sacred red color to differentiate -->
  <text
    x="34"
    y="43"
    font-family="Georgia, serif"
    font-size="26"
    font-weight="700"
    fill="#D4A843"
    letter-spacing="-1"
  >6</text>

  <!-- Underline accent bar in sacred red -->
  <rect x="12" y="45" width="40" height="2.5" fill="#B22234"/>
</svg>
